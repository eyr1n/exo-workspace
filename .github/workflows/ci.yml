name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Configure
        run: uv run cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: uv run cmake --build build

      - name: Run ruff
        run: uv run ruff check

      - name: Run pytest
        run: uv run pytest

      - name: Run ctest
        run: uv run ctest --test-dir build
